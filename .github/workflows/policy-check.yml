name: PR Policy Check

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - ready_for_review
      - labeled
      - unlabeled

permissions:
  contents: read
  pull-requests: read

jobs:
  policy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR policy
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const errors = [];

            const branch = pr.head.ref || "";
            const branchPattern = /^(feat|fix|docs|chore|refactor)\/\d+-[a-z0-9-]+$/;
            if (!branchPattern.test(branch)) {
              errors.push(
                `Branch name "${branch}" is invalid. Use "<type>/<issue-id>-short-slug", e.g. "feat/14-activity-card".`
              );
            }

            const body = pr.body || "";
            const issuePattern = /\b(closes|fixes|resolves)\s+#\d+\b/i;
            if (!issuePattern.test(body)) {
              errors.push(
                `PR body must include an issue-closing reference like "Closes #14".`
              );
            }

            const labels = (pr.labels || []).map((l) => l.name.toLowerCase());
            const requiresChangelog = labels.includes("feature") || labels.includes("chore") || labels.includes("bug");

            if (requiresChangelog) {
              const files = await github.paginate(
                github.rest.pulls.listFiles,
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  per_page: 100,
                }
              );
              const changed = files.map((f) => f.filename);
              if (!changed.includes("CHANGELOG.md")) {
                errors.push(
                  `This PR has label feature/chore/bug and must update CHANGELOG.md.`
                );
              }
            }

            if (errors.length > 0) {
              core.setFailed(`PR policy check failed:\n- ${errors.join("\n- ")}`);
            } else {
              core.info("PR policy check passed.");
            }

