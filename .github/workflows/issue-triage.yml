name: Issue Triage

on:
  issues:
    types:
      - opened
      - edited
      - reopened

permissions:
  issues: write

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Auto-assign and label issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = issue.number;

            if ((issue.assignees || []).length === 0) {
              await github.rest.issues.addAssignees({
                owner,
                repo,
                issue_number,
                assignees: [issue.user.login],
              });
            }

            const labels = new Set((issue.labels || []).map((l) => l.name.toLowerCase()));
            if (labels.size === 0) {
              const title = (issue.title || "").toLowerCase();
              let nextLabel = "chore";
              if (title.includes("bug:") || title.includes("[bug")) nextLabel = "bug";
              else if (title.includes("docs:") || title.includes("[w1")) nextLabel = "docs";
              else if (title.includes("feature:") || title.includes("[w3") || title.includes("[w4")) nextLabel = "feature";

              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number,
                labels: [nextLabel],
              });
            }

